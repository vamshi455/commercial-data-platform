# =============================================================================
# Commercial Data Platform — Databricks Asset Bundle (DAB) root config
# -----------------------------------------------------------------------------
# One bundle, three promotable targets: dev -> qa -> prod.
# Each target maps to its own Unity Catalog (cdp_dev / cdp_qa / cdp_prod) and
# its own workspace path, so the SAME code is deployed everywhere and only the
# config (catalog, schedule, permissions, compute) changes per environment.
#
# Deploy:   databricks bundle deploy   -t dev
# Run:      databricks bundle run job_orchestration_daily -t dev
# Validate: databricks bundle validate -t qa
# =============================================================================

bundle:
  name: commercial-data-platform

# Shared variables — overridden per target below.
variables:
  catalog:
    description: Unity Catalog this environment writes to.
    default: cdp_dev
  landing_volume:
    description: UC Volume path where synthetic source files land.
    default: /Volumes/cdp_dev/landing/files
  notifications_email:
    description: Where job-failure alerts are sent.
    default: vsingam@mhktechinc.com
  pipeline_channel:
    description: DLT / Lakeflow runtime channel (CURRENT or PREVIEW).
    default: CURRENT
  pipeline_development:
    description: >-
      DLT development mode. true = fail fast, NO auto-retries on failure, reuse
      compute (dev). false = production mode (auto-retry recoverable failures).
    default: "false"
  deploy_service_principal:
    description: >-
      Service principal application ID used to run QA/PROD jobs and pipelines.
      Set per-target in CI via --var or DATABRICKS_BUNDLE_VAR_deploy_service_principal.
    default: ""
  # ---- Postgres CRM source (on-demand JDBC ingestion over the ngrok tunnel) ----
  pg_host:
    description: Postgres host for CRM JDBC ingestion (the ngrok tunnel host). Injected at run time by scripts/pull_crm_from_pg.sh.
    default: ""
  pg_port:
    description: Postgres port (the ngrok tunnel port). Injected at run time.
    default: "5432"
  pg_db:
    description: Postgres database holding the CRM source.
    default: cdp_crm
  pg_user:
    description: Read-only Postgres user Databricks connects as.
    default: databricks_reader
  # ---- contract_vector_search module (see docs/specs/contract-vector-search.md) ----
  contracts_schema:
    description: Schema holding contract docs / chunks (module = contract_vector_search).
    default: contracts
  vs_endpoint:
    description: >-
      Mosaic AI Vector Search endpoint (STANDARD) for the contract index. NOTE:
      a VS endpoint is an always-on billed resource — one per environment that
      needs it. Only dev is provisioned today.
    default: cdp_contracts_vs
  warehouse_http_path:
    description: >-
      SQL warehouse HTTP path the served VRR agent uses to read vrr_curated
      (Model Serving has no Spark). Per-target below; dev = the cdp_dev warehouse.
    default: ""

# Resource definitions (jobs + pipelines) live in resources/*.yml and are
# included here so they can reference ${var.*} and ${bundle.target}.
include:
  - resources/*.yml

# =============================================================================
# WORKSPACE HOSTS ARE NOT STORED IN THIS REPO.
# -----------------------------------------------------------------------------
# `workspace.host` is deliberately omitted from every target below. The Databricks
# CLI does not support ${var.*} interpolation on that field (it configures auth),
# so the only ways to pin it are a committed literal or the DATABRICKS_HOST env
# var — and we don't commit it.
#
#   Local:  use scripts/deploy.sh -t <target>. It resolves CDP_HOST_DEV /
#           CDP_HOST_QA / CDP_HOST_PROD from a gitignored .env (see .env.example),
#           exports DATABRICKS_HOST, and refuses to run if the target's host is unset.
#   CI:     .github/workflows/* set DATABRICKS_HOST from the repo variable.
#
# ⚠️  Because the host is no longer pinned per target here, a raw
#     `databricks bundle deploy -t prod` will deploy to whatever DATABRICKS_HOST
#     currently points at. Prefer scripts/deploy.sh, which maps target -> host.
# =============================================================================

targets:

  # ---- DEV: developer iteration, synthetic refreshes, isolated per-user ----
  dev:
    mode: development          # prefixes resources with [dev <user>], pauses schedules
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev
    variables:
      catalog: cdp_dev
      landing_volume: /Volumes/cdp_dev/landing/files
      pipeline_channel: PREVIEW
      pipeline_development: "true"
      warehouse_http_path: /sql/1.0/warehouses/7f0f336bec7b3b0e

  # ---- QA: validation, integration tests, UAT. Shared, scheduled paused. ----
  qa:
    mode: production
    workspace:
      root_path: /Workspace/.bundle/${bundle.name}/qa
    variables:
      catalog: cdp_qa
      landing_volume: /Volumes/cdp_qa/landing/files
      pipeline_channel: CURRENT
    # TEMP WORKAROUND (no service principal / cdp_* groups yet — account-admin
    # blocked): run qa as the deploying user and drop the group permission so a
    # MANUAL deploy works. REVERT to the SP run_as + group grant once they exist.
    run_as:
      user_name: vsingam@mhktechinc.com
    # permissions:
    #   - level: CAN_VIEW
    #     group_name: cdp_analytics_engineers

  # ---- PROD: controlled execution, restricted access, real schedules ----
  prod:
    mode: production
    workspace:
      root_path: /Workspace/.bundle/${bundle.name}/prod
    variables:
      catalog: cdp_prod
      landing_volume: /Volumes/cdp_prod/landing/files
      pipeline_channel: CURRENT
    run_as:
      service_principal_name: ${var.deploy_service_principal}
    permissions:
      - level: CAN_MANAGE
        group_name: cdp_platform_engineers
      - level: CAN_VIEW
        group_name: cdp_data_stewards

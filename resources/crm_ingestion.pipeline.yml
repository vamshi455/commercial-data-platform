# =============================================================================
# resources/crm_ingestion.pipeline.yml
# -----------------------------------------------------------------------------
# Lakeflow Declarative (DLT) pipeline that ingests CRM source files from the
# landing volume into the bronze schema using Auto Loader.
# =============================================================================
resources:
  pipelines:
    crm_ingestion:
      name: "[${bundle.target}] cdp_crm_ingestion"
      catalog: ${var.catalog}
      schema: bronze            # target schema for materialized bronze tables
      serverless: true
      channel: ${var.pipeline_channel}
      development: ${var.pipeline_development}
      continuous: false
      photon: true
      libraries:
        - file:
            path: ../src/pipelines/ingestion/crm_autoloader.py
      configuration:
        cdp.catalog: ${var.catalog}
        # Deployed bundle root, added to sys.path by each module so
        # `src.pipelines._common` imports resolve under serverless DLT.
        cdp.source_root: ${workspace.file_path}
        cdp.landing_path: ${var.landing_volume}
        cdp.source_system: crm
        cdp.target_schema: bronze

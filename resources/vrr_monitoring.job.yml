# One-off job to enable/test Lakehouse Monitoring for GenAI on the VRR agent endpoint.
#   databricks bundle run job_setup_vrr_monitoring -t dev
resources:
  jobs:
    job_setup_vrr_monitoring:
      name: "[${bundle.target}] job_setup_vrr_monitoring"
      description: Enable MLflow 3 production monitoring (safety + groundedness) on the VRR agent endpoint.
      tags:
        platform: commercial-data-platform
        environment: ${bundle.target}
        domain: vrr
      tasks:
        - task_key: setup_monitoring
          notebook_task:
            notebook_path: ../notebooks/agents/setup_vrr_monitoring.py
      queue:
        enabled: true

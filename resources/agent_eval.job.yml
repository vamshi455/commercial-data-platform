# =============================================================================
# resources/agent_eval.job.yml
# -----------------------------------------------------------------------------
# Agent/RAG evaluation job (see docs/agent-evals.md). Seeds the golden set then
# evaluates the contract RAG agent: deterministic hard-gate scorers (PII leak,
# injection, citation, retrieval) + optional Mosaic AI Agent Evaluation judges.
# On-demand (and CI-triggerable). NOT scheduled.
#
# PREREQ to RUN: VS endpoint cdp_contracts_vs ONLINE + a judge/gen model endpoint.
# Deploying this file costs nothing; running it spins compute + LLM tokens.
#   databricks bundle run job_agent_eval -t dev
# =============================================================================
resources:
  jobs:
    job_agent_eval:
      name: "[${bundle.target}] job_agent_eval"
      description: >-
        Agent/RAG evaluation. Seeds the golden set (contracts.eval_dataset) then
        evaluates the contract_intelligence agent: deterministic hard gates (PII
        leak, prompt-injection, citation, retrieval) → ops.eval_results, fail-fast
        on breach; optional Mosaic AI Agent Evaluation LLM judges. Needs the VS
        endpoint online + a judge model. Docs: docs/agent-evals.md.

      tags:
        platform: commercial-data-platform
        environment: ${bundle.target}
        domain: evals

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: vs_endpoint
          default: ${var.vs_endpoint}
        # MLflow experiment that Runs/Traces/Sessions/Evaluations land in.
        - name: experiment
          default: /Users/${workspace.current_user.userName}/cdp_${var.catalog}_agent_eval

      # SDKs for retrieval + agent evaluation.
      environments:
        - environment_key: eval_env
          spec:
            client: "2"
            # Pin floors: Mosaic AI Agent Evaluation (model_type="databricks-agent")
            # + MLflow-3 tracing/sessions used by run_agent_eval.py need these minimums.
            dependencies:
              - mlflow>=3.1.3
              - databricks-agents>=1.1.0
              - databricks-vectorsearch
              - databricks-langchain

      tasks:
        - task_key: seed_eval_dataset
          notebook_task:
            notebook_path: ../src/evals/eval_dataset_seed.py
            base_parameters:
              catalog: ${var.catalog}

        - task_key: run_agent_eval
          depends_on: [{ task_key: seed_eval_dataset }]
          environment_key: eval_env
          notebook_task:
            notebook_path: ../src/evals/run_agent_eval.py
            base_parameters:
              catalog: ${var.catalog}
              vs_endpoint: ${var.vs_endpoint}
              experiment: /Users/${workspace.current_user.userName}/cdp_${var.catalog}_agent_eval
              # Deployed bundle files root so the notebook can import the agent +
              # retriever from sibling dirs (no reliable __file__ in a job notebook).
              source_root: ${workspace.file_path}

      queue:
        enabled: true

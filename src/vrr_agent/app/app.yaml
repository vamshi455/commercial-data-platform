# Databricks App manifest for the VRR report app (design §9.5).
#   databricks apps deploy vrr-report --source-code-path <workspace path to src/vrr_agent/app>
# The app runs as its own service principal — grant it SELECT on cdp_dev.vrr_curated.*
command:
  - streamlit
  - run
  - streamlit_app.py
env:
  - name: CDP_CATALOG
    value: cdp_dev

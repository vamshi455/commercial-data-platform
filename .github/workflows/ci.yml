# =============================================================================
# CI — runs on every pull request. Validates the Databricks Asset Bundle and
# runs Python syntax checks + unit tests. NO deploy happens here.
# Auth: Workload Identity Federation (WIF) — GitHub OIDC. The job mints a
# short-lived GitHub OIDC token (needs `permissions: id-token: write`) that the
# Databricks CLI exchanges for a Databricks token. NO DATABRICKS_CLIENT_SECRET is
# stored — this is the recommended, most secure CI/CD auth. See docs/cicd.md §4.
# =============================================================================
name: ci

on:
  pull_request:
    branches:
      - develop
      - "release/**"
      - main
  workflow_dispatch: {}

# Cancel superseded runs on the same PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    # id-token: write lets this job mint the GitHub OIDC token WIF exchanges for
    # a Databricks token. contents: read is the least-privilege default for checkout.
    permissions:
      id-token: write
      contents: read
    # HOST + CLIENT_ID (the SP app id) are non-secret identifiers; no client secret.
    # DATABRICKS_AUTH_TYPE pins the CLI to GitHub OIDC so misconfig fails loudly.
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
      DATABRICKS_AUTH_TYPE: github-oidc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Python syntax check (compile all .py)
        run: |
          python -m compileall -q data_gen src agents tests scripts || true
          python - <<'PY'
          import ast, glob
          files = (glob.glob("agents/**/*.py", recursive=True)
                   + glob.glob("tests/**/*.py", recursive=True)
                   + glob.glob("data_gen/**/*.py", recursive=True)
                   + glob.glob("src/**/*.py", recursive=True))
          for f in files:
              ast.parse(open(f).read(), filename=f)
          print(f"syntax ok: {len(files)} files")
          PY

      - name: Databricks bundle validate (dev)
        run: databricks bundle validate -t dev

      - name: Run unit tests
        run: pytest -q tests/

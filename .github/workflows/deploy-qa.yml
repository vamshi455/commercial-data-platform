# =============================================================================
# Deploy to QA — runs on push to `develop` and `release/**`.
# Authenticates as the QA service principal via Workload Identity Federation
# (WIF) — GitHub OIDC, no stored client secret. The QA SP's federation policy
# must trust this repo's `qa` environment subject (see docs/cicd.md §4).
# =============================================================================
name: deploy-qa

# DISABLED 2026-07-04: QA workspace was torn down (cost). Auto-deploy triggers
# removed so this never fires against a dead target. Re-enable the push block when
# qa is re-provisioned and the environment is designed. Manual-only for now.
on:
  workflow_dispatch: {}
  # push:
  #   branches:
  #     - develop
  #     - "release/**"

# Never run two QA deploys at once; let the latest finish.
concurrency:
  group: deploy-qa
  cancel-in-progress: false

jobs:
  deploy-qa:
    runs-on: ubuntu-latest
    # Scopes the job to the "qa" GitHub Environment so it pulls QA variables
    # (and any protection rules) defined there.
    environment: qa
    permissions:
      id-token: write      # mint the GitHub OIDC token for WIF
      contents: read
    # Non-secret identifiers, stored as environment-scoped GitHub *variables*.
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
      DATABRICKS_AUTH_TYPE: github-oidc
      BUNDLE_VAR_deploy_service_principal: ${{ vars.DEPLOY_SERVICE_PRINCIPAL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Validate bundle (qa)
        run: databricks bundle validate -t qa

      - name: Deploy bundle (qa)
        run: databricks bundle deploy -t qa
